<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Preparadores - Plataforma de Documentos</title>
    <link rel="icon" type="image/png" href="https://49659256.fs1.hubspotusercontent-na1.net/hubfs/49659256/PDFS/LOGOS%20AFP/logo%20miniatura%20preparadores%20nyc.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-glow: #0088ff;
            --secondary-glow: #00d2ff;
            --glass-bg: rgba(15, 20, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --input-bg: rgba(255, 255, 255, 0.08);
            --success: #00e676;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100vw;
            max-width: 100%;
            overflow-x: hidden;
            background-color: #050505;
        }

        body {
            background-image: url('https://49659256.fs1.hubspotusercontent-na1.net/hubfs/49659256/PDFS/LOGOS%20AFP/ChatGPT%20Image%2014%20mar%202026%2c%2005_53_40%20a.m..png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        h1, h2, h3, h4, h5, button {
            font-family: 'Space Grotesk', sans-serif;
        }

        .header-container {
            width: 100%;
            padding: clamp(10px, 3vw, 20px);
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: clamp(10px, 2vw, 15px) clamp(20px, 5vw, 40px);
            border-radius: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
        }

        .header img {
            max-height: clamp(35px, 5vw, 50px);
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
        }

        .header h3 {
            font-weight: 600;
            font-size: clamp(1rem, 2vw, 1.2rem);
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #ffffff, var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1440px;
            width: 100%;
            margin: 20px auto;
            display: flex;
            justify-content: center; /* Centramos el formulario */
            padding: 0 clamp(15px, 4vw, 40px);
        }

        .form-panel {
            width: 100%;
            max-width: 700px; /* Ancho optimizado para el formulario */
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: clamp(25px, 5vw, 40px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            width: 100%;
        }

        h2 {
            margin-bottom: 10px;
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            background: linear-gradient(135deg, #fff, var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group.full-width { grid-column: span 2; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            font-size: 1rem;
            background-color: var(--input-bg);
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(0, 136, 255, 0.2);
        }

        button {
            background: linear-gradient(135deg, var(--primary-glow), #0055ff);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            grid-column: span 2;
            box-shadow: 0 8px 20px rgba(0, 136, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 136, 255, 0.5);
        }

        .loader {
            display: none;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--secondary-glow);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            grid-column: span 2;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .success-msg { 
            color: var(--success); 
            font-weight: 600; 
            text-align: center; 
            margin-top: 15px; 
            padding: 15px;
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.3);
            border-radius: 12px; 
            display: none; 
            grid-column: span 2;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            button { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <header class="header">
            <img src="https://49659256.fs1.hubspotusercontent-na1.net/hubfs/49659256/PDFS/LOGOS%20AFP/logo%20nyc%20(no%20background).png" alt="Logo">
            <h3>Preparadores NYC</h3>
        </header>
    </div>

    <div class="container">
        <div class="form-panel">
            <div class="card">
                <h2>Emisión de Documentos</h2>
                <p class="subtitle">Complete los datos del cliente para iniciar el proceso de generación.</p>
                
                <form id="slGroupForm" class="form-grid">
                    <div class="form-group full-width">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre" required placeholder="Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label>RUT (con puntos y guión)</label>
                        <input type="text" id="rut" required placeholder="12.345.678-9">
                    </div>
                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" id="fechaNacimiento" required>
                    </div>
                    <div class="form-group">
                        <label>Nacionalidad</label>
                        <input type="text" id="nacionalidad" required placeholder="Chilena">
                    </div>
                    <div class="form-group">
                        <label>Estado Civil</label>
                        <select id="estadoCivil">
                            <option value="Soltero(a)">Soltero(a)</option>
                            <option value="Casado(a)">Casado(a)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Sueldo Líquido</label>
                        <input type="number" id="sueldo" required placeholder="Ej: 900000">
                    </div>
                    <div class="form-group">
                        <label>AFP</label>
                        <select id="afp">
                            <option value="Habitat">Habitat</option>
                            <option value="Capital">Capital</option>
                            <option value="Provida">Provida</option>
                            <option value="Uno">Uno</option>
                            <option value="Cuprum">Cuprum</option>
                            <option value="Modelo">Modelo</option>
                            <option value="PlanVital">Plan Vital</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Dirección</label>
                        <input type="text" id="direccion" required placeholder="Calle 123, Comuna">
                    </div>
                    <div class="form-group full-width">
                        <label>Email de destino</label>
                        <input type="email" id="email" required placeholder="cliente@correo.com">
                    </div>

                    <button type="submit" id="btnSubmit">GENERAR ARCHIVOS</button>
                    <div class="loader" id="loader"></div>
                    <div class="success-msg" id="successMsg"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('slGroupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const loader = document.getElementById('loader');
            const msg = document.getElementById('successMsg');

            btn.style.display = 'none';
            loader.style.display = 'block';

            const payload = {
                "nombre": document.getElementById('nombre').value,
                "rut": document.getElementById('rut').value,
                "fecha": document.getElementById('fechaNacimiento').value,
                "nacionalidad": document.getElementById('nacionalidad').value,
                "sueldo": document.getElementById('sueldo').value,
                "afp": document.getElementById('afp').value,
                "direccion": document.getElementById('direccion').value,
                "email": document.getElementById('email').value
            };

            // REEMPLAZA ESTA URL CON TU WEBHOOK DE MAKE.COM
            fetch('https://hook.us2.make.com/mk1ru9kg4c1s4lqqmigujfd7xgh3lqbh', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                loader.style.display = 'none';
                msg.style.display = 'block';
                
                let countdown = 15;
                msg.innerHTML = `✅ Datos recibidos. Generando documentos en el servidor... Redireccionando en <b>${countdown}s</b>`;

                const timer = setInterval(() => {
                    countdown--;
                    msg.innerHTML = `✅ Datos recibidos. Generando documentos en el servidor... Redireccionando en <b>${countdown}s</b>`;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        window.location.href = 'documentos.html';
                    }
                }, 1000);
            })
            .catch(error => {
                alert("Error de conexión");
                btn.style.display = 'block';
                loader.style.display = 'none';
            });
        });
    </script>
</body>
</html>
