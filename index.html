<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NYC Preparadores</title>

<link rel="icon" type="image/png" href="https://49659256.fs1.hubspotusercontent-na1.net/hubfs/49659256/PDFS/LOGOS%20AFP/logo%20miniatura%20preparadores%20nyc.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#0088ff;
--secondary:#00d2ff;
--glass:rgba(20,25,35,.45);
--border:rgba(255,255,255,.12);
--text:#ffffff;
--muted:rgba(255,255,255,.75);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body,html{
width:100vw;
max-width:100%;
overflow-x:hidden;
background:#050505;
font-family:'Outfit',sans-serif;
color:var(--text);
}

body{
background-image:url("https://49659256.fs1.hubspotusercontent-na1.net/hubfs/49659256/PDFS/LOGOS%20AFP/ChatGPT%20Image%2014%20mar%202026%2c%2005_53_40%20a.m..png");
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
}

h1,h2,h3,h4,button{
font-family:'Space Grotesk',sans-serif;
}

/* HEADER */

.header-container{
width:100%;
padding:20px;
display:flex;
justify-content:center;
position:sticky;
top:0;
z-index:100;
}

.header{

background:var(--glass);
backdrop-filter:blur(20px);

border:1px solid var(--border);

padding:15px 40px;
border-radius:100px;

display:flex;
align-items:center;
gap:20px;
}

.header img{
height:42px;
}

.header h3{
font-size:1.1rem;
font-weight:600;
background:linear-gradient(90deg,#fff,var(--secondary));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* LAYOUT */

.container{

max-width:1400px;

margin:auto;

display:flex;

gap:40px;

padding:20px;
}

.form-panel{
flex:1.2;
}

.preview-panel{
flex:1;

display:flex;
flex-direction:column;

gap:25px;

position:sticky;
top:100px;
}

/* CARDS */

.card{

background:var(--glass);

backdrop-filter:blur(25px);

border-radius:24px;

padding:40px;

border:1px solid var(--border);

box-shadow:0 20px 40px rgba(0,0,0,.4);
}

h2{
font-size:1.6rem;
margin-bottom:15px;
background:linear-gradient(135deg,#fff,var(--secondary));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:.9rem;
color:var(--muted);
margin-bottom:25px;
}

/* FORM */

.form-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;
}

.full{
grid-column:span 2;
}

label{
font-size:.85rem;
margin-bottom:6px;
display:block;
color:var(--muted);
}

input,select{

width:100%;

padding:14px;

border-radius:12px;

border:1px solid rgba(255,255,255,.15);

background:rgba(255,255,255,.08);

color:#fff;

font-size:1rem;
}

button{

grid-column:span 2;

margin-top:10px;

padding:16px;

border-radius:12px;

border:none;

background:linear-gradient(135deg,#0088ff,#0044ff);

font-size:1rem;

font-weight:600;

cursor:pointer;
}

button:hover{
transform:translateY(-2px);
}

/* DOCUMENT PREVIEW */

.preview-box{

width:100%;

aspect-ratio:3/4;

border-radius:16px;

overflow:hidden;

background:rgba(0,0,0,.3);

display:flex;

align-items:center;

justify-content:center;

border:1px dashed rgba(255,255,255,.2);

position:relative;
}

.pdf-frame{
width:100%;
height:100%;
border:none;
}

/* LIQUIDACIONES */

.liquidaciones-grid{

display:flex;

gap:15px;

overflow-x:auto;

padding-bottom:10px;

scroll-snap-type:x mandatory;
}

.liquidaciones-grid::-webkit-scrollbar{
height:6px;
}

.liquidaciones-grid::-webkit-scrollbar-thumb{
background:var(--primary);
border-radius:4px;
}

.liq-item{

min-width:180px;

aspect-ratio:3/4;

border-radius:12px;

background:rgba(0,0,0,.3);

overflow:hidden;

border:1px solid var(--border);

scroll-snap-align:start;

display:flex;

flex-direction:column;
}

.liq-title{

background:rgba(255,255,255,.08);

text-align:center;

font-size:.8rem;

padding:8px;
}

.preview-small{
flex:1;

display:flex;

align-items:center;

justify-content:center;
}

/* MOBILE */

@media(max-width:992px){

.container{
flex-direction:column;
}

.preview-panel{
position:relative;
top:0;
}

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:span 1;
}

button{
grid-column:span 1;
}

}

</style>

</head>

<body>

<div class="header-container">

<header class="header">

<img src="https://49659256.fs1.hubspotusercontent-na1.net/hubfs/49659256/PDFS/LOGOS%20AFP/logo%20nyc%20(no%20background).png">

<h3>Emisión y Resguardo</h3>

</header>

</div>


<div class="container">

<div class="form-panel">

<div class="card">

<h2>Datos del Contribuyente</h2>

<p class="subtitle">Ingrese los datos para generar documentos.</p>

<form id="form" class="form-grid">

<div class="full">
<label>Nombre Completo</label>
<input id="nombre">
</div>

<div>
<label>RUT</label>
<input id="rut">
</div>

<div>
<label>Fecha nacimiento</label>
<input type="date" id="fecha">
</div>

<div>
<label>Nacionalidad</label>
<input id="nacionalidad">
</div>

<div>
<label>Email</label>
<input id="email">
</div>

<button type="submit">Procesar emisión</button>

</form>

</div>

</div>


<div class="preview-panel">

<div class="card">

<h2>Documentos</h2>

<div class="preview-box" id="contrato">

Esperando contrato...

</div>

<div class="preview-box" style="margin-top:20px" id="afp">

Esperando AFP...

</div>

</div>


<div class="card">

<h2>Liquidaciones</h2>

<div class="liquidaciones-grid">

<div class="liq-item">

<div class="liq-title">Mes actual</div>

<div class="preview-small" id="liq1">

Esperando...

</div>

</div>

<div class="liq-item">

<div class="liq-title">Mes -2</div>

<div class="preview-small" id="liq2"></div>

</div>

<div class="liq-item">

<div class="liq-title">Mes -3</div>

<div class="preview-small" id="liq3"></div>

</div>

</div>

</div>

</div>

</div>


<script>

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault()

document.getElementById("contrato").innerHTML=
'<iframe class="pdf-frame" src="https://tuservidor.com/demo-contrato.pdf#toolbar=0"></iframe>'

document.getElementById("afp").innerHTML=
'<iframe class="pdf-frame" src="https://tuservidor.com/demo-afp.pdf#toolbar=0"></iframe>'

document.getElementById("liq1").innerHTML=
'<iframe class="pdf-frame" src="https://tuservidor.com/demo-liq.pdf#toolbar=0"></iframe>'

})

</script>

</body>

</html>
