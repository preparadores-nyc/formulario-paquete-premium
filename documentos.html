<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tus Documentos - SL Group</title>
    
    <style>
        /* --- FONDO Y ESTILOS BASE --- */
        body {
            margin: 0;
            padding: 20px;
            
            /* 2. PEGA AQUÍ EL NOMBRE DE LA FUENTE DE TU INDEX.HTML */
            /* Ejemplo: font-family: 'TuFuente', sans-serif; */
            
            background-image: url('https://49659256.fs1.hubspotusercontent-na1.net/hubfs/49659256/PDFS/LOGOS%20AFP/ChatGPT%20Image%2014%20mar%202026%2c%2005_52_41%20a.m..png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #ffffff;
        }

        /* Capa oscura opcional para que los paneles de cristal destaquen más */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }

        /* --- EFECTO GLASSMORPHISM (CRISTAL TRANSPARENTE) --- */
        .document-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            margin-bottom: 40px;
            padding: 30px;
            box-sizing: border-box;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .document-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
            background: rgba(255, 255, 255, 0.12);
        }

        .document-title {
            margin-top: 0;
            font-size: 1.4rem;
            font-weight: 600;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        /* --- CONTENEDOR DE PDF ADAPTABLE --- */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 70vh;
            min-height: 500px;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background-color: rgba(0, 0, 0, 0.6);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- MODO TELÉFONO CELULAR (RESPONSIVE) --- */
        @media (max-width: 768px) {
            body {
                padding: 15px 10px;
            }
            
            h1 {
                font-size: 1.8rem;
                margin-bottom: 25px;
            }

            .document-card {
                padding: 15px;
                border-radius: 16px;
                margin-bottom: 25px;
            }

            .document-title {
                font-size: 1.2rem;
                margin-bottom: 15px;
                padding-bottom: 10px;
            }

            .iframe-wrapper {
                height: 65vh;
                min-height: 400px;
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="main-container">
        <h1>📄 Tus Documentos Generados</h1>

        <div class="document-card">
            <h2 class="document-title">💼 Contrato de Trabajo</h2>
            <div class="iframe-wrapper">
                <iframe src="TU_ENLACE_AL_CONTRATO_AQUI.pdf" title="Vista previa del contrato"></iframe>
            </div>
        </div>

        <div class="document-card">
            <h2 class="document-title">🏛️ Certificado AFP</h2>
            <div class="iframe-wrapper">
                <iframe src="TU_ENLACE_A_LA_AFP_AQUI.pdf" title="Vista previa de AFP"></iframe>
            </div>
        </div>

        <div class="document-card">
            <h2 class="document-title">📊 Reporte DICOM</h2>
            <div class="iframe-wrapper">
                <iframe src="TU_ENLACE_AL_DICOM_AQUI.pdf" title="Vista previa de DICOM"></iframe>
            </div>
        </div>

    </div>

</body>
</html>
